                </p>

<header class="mb-xl text-center lg:text-left">
<div class="lg:hidden mb-md flex justify-center">
<span class="text-h2 font-h2 font-bold text-primary">MBG Logistics</span>
</div>
<h2 class="text-h2 font-h2 text-on-surface">Selamat Datang</h2>
<p class="text-on-surface-variant font-body-md mt-xs">Silakan masuk ke akun Anda</p>
</header>
<form class="space-y-md">
<!-- Email Input -->
<div class="space-y-xs">
<label class="text-label-md font-label-md text-on-surface-variant" for="email">Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full pl-xl pr-md py-sm rounded-lg border border-outline-variant bg-surface focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all font-body-md" id="email" name="email" placeholder="nama@perusahaan.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-xs">
<div class="flex justify-between items-center">
<label class="text-label-md font-label-md text-on-surface-variant" for="password">Password</label>
<a class="text-label-md font-label-md text-primary hover:underline" href="#">Lupa Password?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full pl-xl pr-md py-sm rounded-lg border border-outline-variant bg-surface focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all font-body-md" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-md flex items-center text-outline hover:text-on-surface-variant" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>

<button class="w-full py-md px-xl bg-primary text-on-primary font-label-md rounded-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm mt-md" type="submit">
                        Masuk
                        <span class="material-symbols-outlined text-[18px]">login</span>
</button>

<!-- Divider -->
<div class="relative my-xl">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>

                        Google

<button class="flex items-center justify-center gap-sm py-sm px-md border border-outline-variant rounded-lg bg-surface hover:bg-surface-container-low transition-colors font-label-md text-on-surface-variant">
<span class="material-symbols-outlined text-[20px]">fingerprint</span>
                        Biometrik
                    </button>
</div>
<!-- Footer Sign Up -->
<footer class="mt-xl text-center">
<p class="text-body-sm font-body-sm text-on-surface-variant">
