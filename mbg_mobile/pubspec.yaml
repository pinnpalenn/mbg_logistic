name: mbg_mobile
description: "Aplikasi Mobile Sistem Distribusi Makanan Bergizi Gratis (MBG)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # HTTP & Networking
  http: ^1.1.0

  # State Management
  provider: ^6.1.1

  # Storage
  shared_preferences: ^2.2.2

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Charts
  fl_chart: ^0.63.0

  # URL Launcher
  url_launcher: ^6.2.2

  # Icons
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
